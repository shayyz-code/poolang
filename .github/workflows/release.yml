name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust Targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  release-linux:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux Binary
        run: cargo build --release

      - name: Package Linux Artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp target/release/poo poo
          tar -czf "poo_${VERSION}_Linux_x86_64.tar.gz" poo

      - name: Upload Linux Artifact To Release
        uses: softprops/action-gh-release@v2
        with:
          files: poo_*_Linux_x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    needs: goreleaser
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows Binary
        run: cargo build --release

      - name: Package Windows Artifact
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Copy-Item "target/release/poo.exe" "poo.exe"
          Compress-Archive -Path "poo.exe" -DestinationPath "poo_${version}_Windows_x86_64.zip" -Force

      - name: Upload Windows Artifact For Scoop Job
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip
          path: poo_*_Windows_x86_64.zip

      - name: Upload Windows Artifact To Release
        uses: softprops/action-gh-release@v2
        with:
          files: poo_*_Windows_x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-scoop:
    needs: release-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release-zip
          path: dist

      - name: Checkout Scoop Bucket
        uses: actions/checkout@v4
        with:
          repository: shayyz-code/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
          path: scoop-bucket

      - name: Update Scoop Manifest
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_FILE="$(ls dist/*.zip | head -n1)"
          HASH="$(shasum -a 256 "$ZIP_FILE" | awk '{print $1}')"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/poo_${VERSION}_Windows_x86_64.zip"

          cat > scoop-bucket/poo.json <<EOF
          {
            "version": "${VERSION}",
            "description": "Tiny interpreted language written in Rust",
            "homepage": "https://github.com/shayyz-code/poolang",
            "url": "${URL}",
            "hash": "${HASH}",
            "bin": "poo.exe",
            "checkver": {
              "github": "https://github.com/shayyz-code/poolang"
            },
            "autoupdate": {
              "url": "https://github.com/shayyz-code/poolang/releases/download/v\\$version/poo_\\$version_Windows_x86_64.zip"
            }
          }
          EOF

      - name: Commit Scoop Manifest
        run: |
          set -euo pipefail
          cd scoop-bucket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add poo.json
          if git diff --cached --quiet; then
            echo "No scoop manifest changes."
            exit 0
          fi
          git commit -m "chore: update poo to ${GITHUB_REF_NAME}"
          git push
