# This file was autogenerated by dist: https://axodotdev.github.io/cargo-dist

name: Release
permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

jobs:
  # Run 'dist plan' to determine what tasks we need to do
  plan:
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ github.ref_name }}
      announcement_tag: ${{ github.ref_name }}
      announcement_tag_is_implicit: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dist
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh"
      - id: plan
        run: |
          dist plan --output-format=json > plan.json
          echo "manifest=$(cat plan.json | jq -c .)" >> "$GITHUB_OUTPUT"

  # Build and upload artifacts for each platform
  upload-artifacts:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        # These are computed by 'dist plan' and passed here
        include: ${{ fromJson(needs.plan.outputs.val).upload_artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dist
        run: ${{ matrix.install_dist }}
      - name: Build artifacts
        run: dist build --tag=${{ needs.plan.outputs.tag }} --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.runner }}
          path: |
            dist-manifest.json
            target/dist/

  # Host the artifacts (e.g., create the GitHub Release)
  publish-artifacts:
    needs: [plan, upload-artifacts]
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dist
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true
      - name: Publish to GitHub Release
        run: |
          dist host --tag=${{ needs.plan.outputs.tag }} --steps=upload --steps=create-release
          
  # Finalize the release (mark as non-draft, announce)
  announce:
    needs: [plan, publish-artifacts]
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dist
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh"
      - name: Announce Release
        run: |
          dist announce --tag=${{ needs.plan.outputs.tag }}
